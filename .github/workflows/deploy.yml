name: Auto Deploy Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build server
        working-directory: ./server
        run: mvn clean package -DskipTests

      - name: Prepare Space Files
        run: |
          mkdir -p hf-space

          cp -r server hf-space/server
          cp Dockerfile hf-space/Dockerfile

          cat > hf-space/README.md <<'EOF'
          ---
          title: Host Server BTL
          emoji: ⚡
          colorFrom: indigo
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          # Host Server BTL
          EOF

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.TOKEN }}
        run: |
          pip install huggingface_hub

          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.upload_folder(
              folder_path="hf-space",
              repo_id="tbttkc/host-server-btl",
              repo_type="space",
              commit_message="Auto deploy from GitHub"
          )
          PY