name: Auto Deploy Server

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build server
        working-directory: ./server
        run: mvn clean package -DskipTests

      - name: Prepare Space Files
        run: |
          rm -rf hf-space
          mkdir -p hf-space

          cp -r server hf-space/server

          sed -i 's/server.port=8080/server.port=7860/g' \
          hf-space/server/src/main/resources/application.properties

          cat > hf-space/Dockerfile <<'EOF'
          FROM maven:3.9-eclipse-temurin-21 AS build

          WORKDIR /app

          COPY server ./server

          WORKDIR /app/server

          RUN mvn clean package -DskipTests

          FROM eclipse-temurin:21-jre

          WORKDIR /app

          COPY --from=build /app/server/target/*.jar app.jar

          ENV PORT=7860

          EXPOSE 7860

          CMD ["java", "-jar", "app.jar"]
          EOF

      - name: Deploy to Server
        env:
          HF_TOKEN: ${{ secrets.TOKEN }}
        run: |
          pip install "huggingface_hub==0.25.2"

          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"].strip()

          api = HfApi(token=token)

          api.upload_folder(
              folder_path="hf-space",
              repo_id="tbttkc/host-server-btl",
              repo_type="space",
              commit_message="Auto deploy server",
              ignore_patterns=[
                  "server/target/*",
                  "server/.idea/*",
                  "server/.git/*",
                  "**/__pycache__/*"
              ]
          )
          PY