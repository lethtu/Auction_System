name: Auto Deploy Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build server
        working-directory: ./server
        run: mvn clean package -DskipTests

      - name: Prepare Space Files
        run: |
            mkdir -p hf-space
            cp -r server hf-space/server

            cat > hf-space/Dockerfile <<'EOF'
            FROM maven:3.9-eclipse-temurin-21 AS build
            WORKDIR /app
            COPY server ./server

            WORKDIR /app/server
            RUN mvn clean package -DskipTests

            FROM eclipse-temurin:21-jre
            WORKDIR /app
            COPY --from=build /app/server/target/*.jar app.jar

            ENV PORT=7860
            EXPOSE 7860

            CMD ["java", "-jar", "app.jar"]
            EOF

      - name: Deploy to Server
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          pip install huggingface_hub

          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["TOKEN"])

          api.upload_folder(
              folder_path="hf-space",
              repo_id="tbttkc/host-server-btl",
              repo_type="space",
              commit_message="Auto deploy from GitHub"
          )
          PY