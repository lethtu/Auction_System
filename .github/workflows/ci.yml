name: Java CI with Maven

on:
  push:
    branches: [ "main", "master", "develop", "develop/minh-seller-admin" ]
  pull_request:
    branches: [ "main", "master", "develop", "develop/minh-seller-admin" ]

jobs:
  build-server:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: pw
          MYSQL_DATABASE: auction_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ppw --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Import Database
        run: |
          if [ -f Data.sql ]; then
            mysql -h 127.0.0.1 -P 3306 -u root -ppw auction_system < Data.sql
          else
            echo "Data.sql not found, skipping database import."
          fi

      - name: Check Code Convention (Checkstyle)
        working-directory: server
        run: mvn -B checkstyle:check

      - name: Build and Test Server
        working-directory: server
        run: mvn -B clean test

  build-client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install JavaFX test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libxrender1 libxtst6 libxi6

      - name: Check Code Convention (Checkstyle)
        working-directory: client
        run: mvn -B checkstyle:check

      - name: Build and Test Client
        working-directory: client
        run: xvfb-run -a mvn -B clean test