name: Java CI with Maven

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-server:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Tungpro@123
          MYSQL_DATABASE: auction_system
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Wait for MySQL to be ready
      run: |
        while ! mysqladmin ping -h"127.0.0.1" -P"3306" -u"root" -p"Tungpro@123" --silent; do
          sleep 1
        done

    - name: Import Database
      run: |
        mysql -h 127.0.0.1 -P 3306 -u root -pTungpro@123 auction_system < Data.sql
    
    - name: Build and Test Server
      run: |
        cd server
        mvn -B clean install
    
    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: auction-system-server
        path: server/target/*.jar

  build-client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Install dependencies for JavaFX (X11)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libgtk-3-0 libcanberra-gtk-module libx11-6 libxext6 libxrender1 libxtst6 libxi6 libasound2
    
    - name: Build and Test Client
      run: |
        cd client
        xvfb-run mvn -B clean install
    
    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: auction-system-client
        path: client/target/*.jar
